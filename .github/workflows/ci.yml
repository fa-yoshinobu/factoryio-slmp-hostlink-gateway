name: CI

on:
  push:
  pull_request:

jobs:
  build-test-smoke:
    name: Build, test, and smoke
    runs-on: windows-latest
    defaults:
      run:
        working-directory: factoryio-slmp-hostlink-gateway

    steps:
      - name: Checkout gateway
        uses: actions/checkout@v4
        with:
          path: factoryio-slmp-hostlink-gateway

      - name: Checkout PlcComm.Slmp
        uses: actions/checkout@v4
        with:
          repository: fa-yoshinobu/plc-comm-slmp-dotnet
          path: plc-comm-slmp-dotnet

      - name: Checkout PlcComm.KvHostLink
        uses: actions/checkout@v4
        with:
          repository: fa-yoshinobu/plc-comm-hostlink-dotnet
          path: plc-comm-hostlink-dotnet

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build
        run: dotnet build GatewayApp.sln -c Release

      - name: Unit tests
        run: dotnet test GatewayApp.sln -c Release --no-build

      - name: Smoke tests
        run: dotnet run --project GatewayApp.SmokeTests/GatewayApp.SmokeTests.csproj -c Release --no-build
