name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release. Leave empty to use GatewayApp.csproj.
        required: false
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Resolve release version
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          [xml]$project = Get-Content 'GatewayApp/GatewayApp.csproj'
          $projectVersion = [string]$project.Project.PropertyGroup.Version
          $inputVersion = '${{ inputs.version }}'.Trim()
          $version = if ($inputVersion.Length -gt 0) { $inputVersion } else { $projectVersion }

          if ($version -notmatch '^\d+\.\d+\.\d+(-[A-Za-z0-9.-]+)?$') {
            throw "Invalid version: $version"
          }

          if ($inputVersion.Length -gt 0 -and $inputVersion -ne $projectVersion) {
            throw "Input version '$inputVersion' does not match GatewayApp.csproj version '$projectVersion'."
          }

          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "TAG=v$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ASSET_NAME=FactoryIOGateway-v$version-win-x64.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build
        run: dotnet build GatewayApp.sln -c Release

      - name: Unit tests
        run: dotnet test GatewayApp.sln -c Release --no-build

      - name: Smoke tests
        run: dotnet run --project GatewayApp.SmokeTests/GatewayApp.SmokeTests.csproj -c Release --no-build

      - name: Publish single-file executable
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $publishDir = Join-Path $env:RUNNER_TEMP 'factoryio-gateway-win-x64'

          if (Test-Path $publishDir) {
            Remove-Item -LiteralPath $publishDir -Recurse -Force
          }

          dotnet publish GatewayApp/GatewayApp.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o $publishDir `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=None `
            -p:DebugSymbols=false

          $exePath = Join-Path $publishDir 'FactoryIOGateway.exe'
          if (-not (Test-Path $exePath)) {
            throw "FactoryIOGateway.exe was not created."
          }

          Get-ChildItem -LiteralPath $publishDir -Force |
            Where-Object { $_.Name -ne 'FactoryIOGateway.exe' } |
            ForEach-Object {
              if ($_.PSIsContainer) {
                Remove-Item -LiteralPath $_.FullName -Recurse -Force
              } else {
                Remove-Item -LiteralPath $_.FullName -Force
              }
            }

          $assetDir = Join-Path $env:RUNNER_TEMP 'release-assets'
          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null
          $assetPath = Join-Path $assetDir $env:ASSET_NAME
          Compress-Archive -LiteralPath $exePath -DestinationPath $assetPath -Force

          "ASSET_PATH=$assetPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'

          $originalNativeErrorAction = $PSNativeCommandUseErrorActionPreference
          $PSNativeCommandUseErrorActionPreference = $false
          gh release view $env:TAG *> $null
          $releaseViewExitCode = $LASTEXITCODE
          $PSNativeCommandUseErrorActionPreference = $originalNativeErrorAction

          if ($releaseViewExitCode -eq 0) {
            throw "Release $env:TAG already exists."
          }

          $notesPath = Join-Path $env:RUNNER_TEMP 'release-notes.md'
          @"
          ## Download

          - $env:ASSET_NAME

          ## Notes

          This release was built by GitHub Actions from commit $env:GITHUB_SHA.
          "@ | Set-Content -LiteralPath $notesPath -Encoding UTF8

          gh release create $env:TAG $env:ASSET_PATH `
            --target $env:GITHUB_SHA `
            --title "Factory I/O Gateway $env:TAG" `
            --notes-file $notesPath `
            --latest

      - name: Start VirusTotal scan
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run virustotal-release.yml --ref main --field tag=${{ env.TAG }}
